  # MEP coordination worker (from main). Preserved through the split-compose
  # merge; not started unless explicitly brought up (heavy 16G worker).
  ifccoord-worker:
    build:
      context: .
      dockerfile: ifccoord-worker/Dockerfile
      args:
        - IFCCOORD_TAG=${IFCCOORD_TAG:-latest}
    platform: linux/amd64
    volumes:
      - ./shared/uploads:/uploads
      - ./shared/output:/output
      - ./shared/examples:/examples
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=DEBUG
      - REDIS_URL=redis://redis:6379/0
      # The warm BVH cache silently corrupts repeated coordination runs
      # (cold=real clashes, warm=0 clashes); keep it off for correctness. It
      # only saves the ~6s tree build, not the expensive occupancy solve.
      - IFCCLASH_BVH_CACHE=${IFCCLASH_BVH_CACHE:-off}
    depends_on:
      - redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 16G

  topologicpy-worker:
    build:
      context: .
      dockerfile: topologicpy-worker/Dockerfile
    platform: linux/amd64
    # Run jobs WITHOUT forking a work-horse. The default RQ worker fork()s per
    # job, and the native topologic/OCCT geometry stack is not fork-safe here:
    # the forked child intermittently corrupts memory (segfault, or Python type
    # confusion like "'SpaceCandidate' object is not iterable"). The identical
    # job runs cleanly in-process, so SimpleWorker (no fork) is the fix.
    command: ["rq", "worker", "--worker-class", "rq.worker.SimpleWorker", "topologicpy-worker", "--url", "redis://redis:6379/0", "--path", "/app"]
    user: "1000:1000"
    volumes:
      - ./shared/uploads:/uploads
      - ./shared/output:/output
      - ./shared/examples:/examples
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - REDIS_URL=redis://redis:6379/0
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-ifcpipeline}
      - POSTGRES_USER=${POSTGRES_USER:-ifcpipeline}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      - USE_OBJECT_STORAGE=${USE_OBJECT_STORAGE:-true}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://minio:9000}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_BUCKET=${S3_BUCKET:-ifcpipeline}
      - S3_REGION=${S3_REGION:-us-east-1}
      - IFCTOPOLOGY_ITERATOR_THREADS=${IFCTOPOLOGY_ITERATOR_THREADS:-4}
      - IFCTOPOLOGY_CELL_MODE=${IFCTOPOLOGY_CELL_MODE:-prism}
      - IFCTOPOLOGY_DISTANCE_MODE=${IFCTOPOLOGY_DISTANCE_MODE:-bbox}
      - IFCTOPOLOGY_MAX_PROXIMATE_SPACES=${IFCTOPOLOGY_MAX_PROXIMATE_SPACES:-32}
      - IFCTOPOLOGY_PROXIMITY_THRESHOLD_M=${IFCTOPOLOGY_PROXIMITY_THRESHOLD_M:-10.0}
      - IFCTOPOLOGY_PROGRESS_LOG_EVERY=${IFCTOPOLOGY_PROGRESS_LOG_EVERY:-250}
      # Space-model cache: skip ifcopenshell load + per-space create_shape on
      # reruns against an unchanged spatial file (see space_cache.py).
      - IFCTOPOLOGY_SPACE_CACHE=${IFCTOPOLOGY_SPACE_CACHE:-off}
      - IFCTOPOLOGY_SPACE_CACHE_DIR=${IFCTOPOLOGY_SPACE_CACHE_DIR:-/tmp/topology-space-cache}
      - IFCTOPOLOGY_SPACE_CACHE_MAX_MB=${IFCTOPOLOGY_SPACE_CACHE_MAX_MB:-2048}
      - IFCTOPOLOGY_SPACE_CACHE_MINIO_PREFIX=${IFCTOPOLOGY_SPACE_CACHE_MINIO_PREFIX:-cache/topology-spaces}
      # BREP cell cache: OFF by default. ByBREPString-rebuilt mesh cells can
      # segfault topologic containment (OCCT) on some datasets. Opt-in only.
      - IFCTOPOLOGY_CELL_CACHE=${IFCTOPOLOGY_CELL_CACHE:-off}
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
      minio-setup:
        condition: service_started
    restart: unless-stopped
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '2.0'
          memory: 6G
