services:
  ifc5d-worker:
    build:
      context: .
      dockerfile: ifc5d-worker/Dockerfile
    platform: linux/amd64
    user: "1000:1000"
    volumes:
      - ./shared/uploads:/uploads
      - ./shared/output:/output
      - ./shared/examples:/examples
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - REDIS_URL=redis://redis:6379/0
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-ifcpipeline}
      - POSTGRES_USER=${POSTGRES_USER:-ifcpipeline}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      - USE_OBJECT_STORAGE=${USE_OBJECT_STORAGE:-true}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://minio:9000}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_BUCKET=${S3_BUCKET:-ifcpipeline}
      - S3_REGION=${S3_REGION:-us-east-1}
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
      minio-setup:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  ifcpatch-worker:
    build:
      context: .
      dockerfile: ifcpatch-worker/Dockerfile
    platform: linux/amd64
    user: "1000:1000"
    # Core dumps are OFF by default (each ifcopenshell SIGSEGV would otherwise
    # write a 600 MB – 1.1 GB core under /var/crash/cores; at N≥3 replicas
    # that fills disk in a couple of weeks). Spawn isolation in tasks.py
    # already prevents the rq worker from dying, so cores aren't needed in
    # steady state. Re-enable for debugging by setting IFCPATCH_CORE_LIMIT=-1
    # in .env (or `IFCPATCH_CORE_LIMIT=-1 docker compose up -d --no-deps
    # ifcpatch-worker`); the host kernel.core_pattern set by
    # scripts/stabilize-host.sh routes the dumps to /var/crash/cores via the
    # bind mount below. RLIMIT_CORE set here is inherited by every child
    # (rq worker, work-horse, every spawn-isolated subprocess), so no `ulimit`
    # in the wrapper command is needed.
    ulimits:
      core: ${IFCPATCH_CORE_LIMIT:-0}
    command: >
      rq worker ifcpatch --url redis://redis:6379/0 --path /app
      --logging_level INFO --with-scheduler
    volumes:
      - ./shared/uploads:/uploads
      - ./shared/output:/output
      - ./shared/examples:/examples
      - ./ifcpatch-worker/custom_recipes:/app/custom_recipes
      # Bind core dumps from inside the container to a host directory so
      # we can post-mortem ifcopenshell SIGSEGVs with gdb after the fact.
      - /var/crash/cores:/var/crash/cores
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # When debugging a recurring crash, set IFCPATCH_DEBUG=1 in .env to
      # log every recipe argument verbatim before invoking ifcopenshell.
      - IFCPATCH_DEBUG=${IFCPATCH_DEBUG:-0}
      - REDIS_URL=redis://redis:6379/0
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-ifcpipeline}
      - POSTGRES_USER=${POSTGRES_USER:-ifcpipeline}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      - USE_OBJECT_STORAGE=${USE_OBJECT_STORAGE:-true}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://minio:9000}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_BUCKET=${S3_BUCKET:-ifcpipeline}
      - S3_REGION=${S3_REGION:-us-east-1}
      # TessellateElements uses a multi-threaded geom iterator; cap BLAS/OpenMP to limit RSS spikes.
      - OMP_NUM_THREADS=1
      - OPENBLAS_NUM_THREADS=1
      - MKL_NUM_THREADS=1
      - NUMEXPR_NUM_THREADS=1
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
      minio-setup:
        condition: service_started
    restart: unless-stopped
    deploy:
      # Reduced from 3 to 2 replicas (2026-05-14): three concurrent workers ×
      # 6G could collide at the top of each hour and exceed the 33 GiB host
      # (no swap), correlating with the SIGSEGV storm in
      # _ifcopenshell_wrapper.cpython-311-x86_64-linux-gnu.so on May 13/14.
      # See plans/teams_error_culprit_analysis_*.plan.md.
      replicas: 2
      resources:
        limits:
          cpus: '2.0'
          # Lowered from 6G to 4G: still covers full-building TessellateElements
          # but bounds total ifcpatch-worker headroom to 2 × 4G = 8G instead of
          # 3 × 6G = 18G on a 33 GiB host.
          memory: 4G

  ifcconvert-worker:
    build:
      context: .
      dockerfile: ifcconvert-worker/Dockerfile
    platform: linux/amd64
    user: "1000:1000"
    volumes:
