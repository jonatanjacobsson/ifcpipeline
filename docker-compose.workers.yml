      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-ifcpipeline}
      - POSTGRES_USER=${POSTGRES_USER:-ifcpipeline}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      - USE_OBJECT_STORAGE=${USE_OBJECT_STORAGE:-true}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://minio:9000}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_BUCKET=${S3_BUCKET:-ifcpipeline}
      - S3_REGION=${S3_REGION:-us-east-1}
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
      minio-setup:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G

  ifcclash-worker:
    build:
      context: .
      dockerfile: ifcclash-worker/Dockerfile
    platform: linux/amd64
    user: "1000:1000"
    # Same core-dump policy as ifcpatch-worker: OFF by default, toggle with
    # IFCPATCH_CORE_LIMIT=-1 in .env when debugging (single env var covers
    # both worker types). See ifcpatch-worker block above for the rationale.
    ulimits:
      core: ${IFCPATCH_CORE_LIMIT:-0}
    command: >
      rq worker ifcclash --url redis://redis:6379/0 --path /app
      --logging_level INFO --with-scheduler
    volumes:
      - ./shared/uploads:/uploads
      - ./shared/output:/output
      - ./shared/examples:/examples
      - /var/crash/cores:/var/crash/cores
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - REDIS_URL=redis://redis:6379/0
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-ifcpipeline}
      - POSTGRES_USER=${POSTGRES_USER:-ifcpipeline}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      - USE_OBJECT_STORAGE=${USE_OBJECT_STORAGE:-true}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://minio:9000}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_BUCKET=${S3_BUCKET:-ifcpipeline}
      - S3_REGION=${S3_REGION:-us-east-1}
      # Hardening knobs (see .env for documentation). All three are runtime
      # toggles so flipping them does not require rebuilding the image.
      - IFCCLASH_GEOMETRY_LIBRARY=${IFCCLASH_GEOMETRY_LIBRARY:-cgal}
      # Empty fallback lets ifcclash-worker/tasks.py:_resolve_iterator_threads
      # pick min(cpu_count, 8) when the .env value is missing. Was hard-coded
      # to 1 prior to 2026-05-17.
      - IFCCLASH_ITERATOR_THREADS=${IFCCLASH_ITERATOR_THREADS:-}
      - IFCCLASH_ISOLATE=${IFCCLASH_ISOLATE:-1}
      # BVH/tessellation cache (HdfSerializer keyed by sha256(file)+kernel).
      # Off by default; flip to "on" in .env after the first deploy to make
      # back-to-back clash calls against the same input file reuse the
      # cached per-element tessellation. See ifcclash-worker/bvh_cache.py.
      - IFCCLASH_BVH_CACHE=${IFCCLASH_BVH_CACHE:-off}
      - IFCCLASH_BVH_CACHE_DIR=${IFCCLASH_BVH_CACHE_DIR:-/tmp/ifcclash-bvh-cache}
      - IFCCLASH_BVH_CACHE_MAX_MB=${IFCCLASH_BVH_CACHE_MAX_MB:-4096}
      - IFCCLASH_BVH_CACHE_MINIO_PREFIX=${IFCCLASH_BVH_CACHE_MINIO_PREFIX:-cache/clash-tess}
      # Validation cache (Redis-backed, keyed by sha256(file)+kernel) — skips
      # the ~2-3 s ifcopenshell.open() + iterator probe in validate_ifc_file
      # on back-to-back clashes against the same inputs. See
      # ifcclash-worker/validation_cache.py.
      - IFCCLASH_VALIDATE_CACHE=${IFCCLASH_VALIDATE_CACHE:-off}
      - IFCCLASH_VALIDATE_CACHE_TTL_S=${IFCCLASH_VALIDATE_CACHE_TTL_S:-604800}
      - IFCCLASH_VALIDATE_CACHE_PREFIX=${IFCCLASH_VALIDATE_CACHE_PREFIX:-ifcclash:validate}
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
      minio-setup:
        condition: service_started
    restart: unless-stopped
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '4.0'
          memory: '12G'

