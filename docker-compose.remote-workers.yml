# Remote worker stack (worker host). Includes canonical worker definitions from
# docker-compose.workers.yml and applies external broker/storage env from .env.remote.
#
# Remote profile (bimbotw1): ifctester, ifcpatch, ifcclash, ifcdiff, ifccoord,
# topologicpy.
# Primary-local workers (ifc5d, ifcconvert, ifccsv, ifcfast, ifc2json, ifcfrag)
# and guid-index-worker use profile [never] here.
# Usage (worker host, repo root):
#   COMPOSE_PROFILES=remote docker compose -f docker-compose.remote-workers.yml \
#     --env-file .env.remote up -d ifctester-worker ifcpatch-worker ifcclash-worker ifcdiff-worker
#
# Or: ./scripts/start-remote-workers.sh

# Container prefix: ifcpipeline-w1-<service>-1 (override per worker VM in .env.remote)
name: ${REMOTE_COMPOSE_PROJECT:-ifcpipeline-w1}

include:
  - path: docker-compose.workers.yml

x-remote-worker-env: &remote-worker-env
  PYTHONUNBUFFERED: "1"
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  REDIS_URL: ${REDIS_URL:?Set REDIS_URL in .env.remote}
  POSTGRES_HOST: ${POSTGRES_HOST:?Set POSTGRES_HOST in .env.remote}
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}
  POSTGRES_DB: ${POSTGRES_DB:-ifcpipeline}
  POSTGRES_USER: ${POSTGRES_USER:-ifcpipeline}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.remote}
  USE_OBJECT_STORAGE: ${USE_OBJECT_STORAGE:-true}
  S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:?Set S3_ENDPOINT_URL in .env.remote}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY:?Set S3_ACCESS_KEY in .env.remote}
  S3_SECRET_KEY: ${S3_SECRET_KEY:?Set S3_SECRET_KEY in .env.remote}
  S3_BUCKET: ${S3_BUCKET:-ifcpipeline}
  S3_REGION: ${S3_REGION:-us-east-1}
  S3_CHECKSUM_MODE: ${S3_CHECKSUM_MODE:-app}

services:
  ifctester-worker:
    profiles: [remote]
    image: ifcpipeline-ifctester-worker:latest
    depends_on: !reset []
    environment:
      <<: *remote-worker-env
    command: >
      rq worker ifctester --url ${REDIS_URL} --path /app
      --logging_level INFO
    deploy:
      replicas: ${IFCTESTER_REMOTE_REPLICAS:-1}
      resources:
        limits:
          cpus: "0.5"
          memory: 1G

  ifcpatch-worker:
    profiles: [remote]
    image: ifcpipeline-ifcpatch-worker:latest
    depends_on: !reset []
    volumes:
      - ./ifcpatch-worker/custom_recipes:/app/custom_recipes
    environment:
      <<: *remote-worker-env
      IFCPATCH_DEBUG: ${IFCPATCH_DEBUG:-0}
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
    command: >
      rq worker ifcpatch --url ${REDIS_URL} --path /app
      --logging_level INFO --with-scheduler
    deploy:
      replicas: ${IFCPATCH_REMOTE_REPLICAS:-1}
      resources:
        limits:
          cpus: "2.0"
          memory: 4G

  ifcclash-worker:
    profiles: [remote]
    image: ifcpipeline-ifcclash-worker:latest
    depends_on: !reset []
    environment:
      <<: *remote-worker-env
      IFCCLASH_GEOMETRY_LIBRARY: ${IFCCLASH_GEOMETRY_LIBRARY:-cgal}
      IFCCLASH_ITERATOR_THREADS: ${IFCCLASH_ITERATOR_THREADS:-}
      IFCCLASH_ISOLATE: ${IFCCLASH_ISOLATE:-1}
      IFCCLASH_BVH_CACHE: ${IFCCLASH_BVH_CACHE:-off}
      IFCCLASH_BVH_CACHE_DIR: ${IFCCLASH_BVH_CACHE_DIR:-/tmp/ifcclash-bvh-cache}
      IFCCLASH_BVH_CACHE_MAX_MB: ${IFCCLASH_BVH_CACHE_MAX_MB:-4096}
      IFCCLASH_BVH_CACHE_MINIO_PREFIX: ${IFCCLASH_BVH_CACHE_MINIO_PREFIX:-cache/clash-tess}
      IFCCLASH_VALIDATE_CACHE: ${IFCCLASH_VALIDATE_CACHE:-off}
      IFCCLASH_VALIDATE_CACHE_TTL_S: ${IFCCLASH_VALIDATE_CACHE_TTL_S:-604800}
      IFCCLASH_VALIDATE_CACHE_PREFIX: ${IFCCLASH_VALIDATE_CACHE_PREFIX:-ifcclash:validate}
    command: >
      rq worker ifcclash --url ${REDIS_URL} --path /app
      --logging_level INFO --with-scheduler
    deploy:
      replicas: ${IFCCLASH_REMOTE_REPLICAS:-1}
      resources:
        limits:
          cpus: "4.0"
          memory: 12G

  ifcdiff-worker:
    profiles: [remote]
    image: ifcpipeline-ifcdiff-worker:latest
    depends_on: !reset []
    environment:
      <<: *remote-worker-env
    command: >
      rq worker ifcdiff --url ${REDIS_URL} --path /app
      --logging_level INFO
    deploy:
      replicas: ${IFCDIFF_REMOTE_REPLICAS:-1}
      resources:
        limits:
          cpus: "1.0"
          memory: 4G

  ifccoord-worker:
    profiles: [remote]
    image: ifcpipeline-ifccoord-worker:latest
    depends_on: !reset []
    environment:
      <<: *remote-worker-env
      IFCCLASH_GEOMETRY_LIBRARY: ${IFCCLASH_GEOMETRY_LIBRARY:-hybrid-cgal-simple-opencascade}
      IFCCLASH_ITERATOR_THREADS: ${IFCCLASH_ITERATOR_THREADS:-1}
      IFCCLASH_ISOLATE: ${IFCCLASH_ISOLATE:-1}
      IFCCLASH_COARSE_PROFILE: ${IFCCLASH_COARSE_PROFILE:-nobel}
      IFCCLASH_BVH_CACHE: ${IFCCLASH_BVH_CACHE:-off}
    command: >
      rq worker --worker-class rq.worker.SimpleWorker ifccoord
      --url ${REDIS_URL} --path /app --logging_level INFO
    deploy:
      replicas: ${IFCCOORD_REMOTE_REPLICAS:-1}
      resources:
        limits:
          cpus: "4.0"
          memory: 16G
    mem_limit: 16g
    memswap_limit: 16g

  topologicpy-worker:
    profiles: [remote]
    image: ifcpipeline-topologicpy-worker:latest
    user: "1000:1000"
    depends_on: !reset []
    networks: !reset []
    environment:
      <<: *remote-worker-env
      IFCTOPOLOGY_ITERATOR_THREADS: ${IFCTOPOLOGY_ITERATOR_THREADS:-4}
      IFCTOPOLOGY_CELL_MODE: ${IFCTOPOLOGY_CELL_MODE:-prism}
      IFCTOPOLOGY_DISTANCE_MODE: ${IFCTOPOLOGY_DISTANCE_MODE:-bbox}
      IFCTOPOLOGY_MAX_PROXIMATE_SPACES: ${IFCTOPOLOGY_MAX_PROXIMATE_SPACES:-32}
      IFCTOPOLOGY_PROXIMITY_THRESHOLD_M: ${IFCTOPOLOGY_PROXIMITY_THRESHOLD_M:-10.0}
      IFCTOPOLOGY_PROGRESS_LOG_EVERY: ${IFCTOPOLOGY_PROGRESS_LOG_EVERY:-250}
      IFCTOPOLOGY_SPACE_CACHE: ${IFCTOPOLOGY_SPACE_CACHE:-off}
      IFCTOPOLOGY_SPACE_CACHE_DIR: ${IFCTOPOLOGY_SPACE_CACHE_DIR:-/tmp/topology-space-cache}
      IFCTOPOLOGY_SPACE_CACHE_MAX_MB: ${IFCTOPOLOGY_SPACE_CACHE_MAX_MB:-2048}
      IFCTOPOLOGY_SPACE_CACHE_MINIO_PREFIX: ${IFCTOPOLOGY_SPACE_CACHE_MINIO_PREFIX:-cache/topology-spaces}
      IFCTOPOLOGY_CELL_CACHE: ${IFCTOPOLOGY_CELL_CACHE:-off}
      CDE_S3_ENDPOINT_URL: ${CDE_S3_ENDPOINT_URL:-}
      CDE_S3_BUCKET: ${CDE_S3_BUCKET:-cde}
      CDE_S3_ACCESS_KEY: ${CDE_S3_ACCESS_KEY:-}
      CDE_S3_SECRET_KEY: ${CDE_S3_SECRET_KEY:-}
      CDE_S3_REGION: ${CDE_S3_REGION:-us-east-1}
    command: >
      rq worker --worker-class rq.worker.SimpleWorker topologicpy-worker
      --url ${REDIS_URL} --path /app --logging_level INFO
    deploy:
      replicas: ${TOPOLOGICPY_REMOTE_REPLICAS:-1}
      resources:
        limits:
          cpus: "2.0"
          memory: 6G

  # Dozzle agent — primary Dozzle at :9182 connects via DOZZLE_REMOTE_AGENT.
  dozzle-agent:
    image: amir20/dozzle:latest
    command: agent
    environment:
      - DOZZLE_HOSTNAME=${DOZZLE_AGENT_HOSTNAME:-bimbotw1}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "7007:7007"
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 128M

  # Workers not deployed remotely — disable when using this compose file.
  ifc5d-worker:
    profiles: [never]
  ifcconvert-worker:
    profiles: [never]
  ifccsv-worker:
    profiles: [never]
  ifcfast-worker:
    profiles: [never]
  ifc2json-worker:
    profiles: [never]
  ifcfrag-worker:
    profiles: [never]
