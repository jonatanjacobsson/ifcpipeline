# SeaweedFS dual-write pilot — drop-in override for the main compose file.
#
# Bring-up:
#   docker compose -f docker-compose.yml -f docker-compose.seaweedfs.yml \
#     --profile seaweedfs-pilot up -d
#
# When S3_SHADOW_ENDPOINT_URL is empty (the default), the *_SHADOW vars added
# to api-gateway + every worker are inert and shared/object_storage.py keeps
# behaving exactly like the MinIO-only stack. Setting them in .env turns the
# dual-write path on. See SEAWEEDFS_PILOT.md for the full runbook.

x-shadow-env: &shadow-env
  - S3_SHADOW_ENDPOINT_URL=${S3_SHADOW_ENDPOINT_URL:-}
  - S3_SHADOW_ACCESS_KEY=${S3_SHADOW_ACCESS_KEY:-}
  - S3_SHADOW_SECRET_KEY=${S3_SHADOW_SECRET_KEY:-}
  - S3_SHADOW_BUCKET=${S3_SHADOW_BUCKET:-ifcpipeline}
  - S3_SHADOW_REGION=${S3_SHADOW_REGION:-us-east-1}
  - S3_SHADOW_REPORTS_DIR=/reports

services:
  # ------------------------------------------------------------------------
  # SeaweedFS pilot stack — only starts when --profile seaweedfs-pilot is set
  # ------------------------------------------------------------------------

  # SeaweedFS single-process server: master + volume + filer + S3 gateway.
  # Loopback-only host ports; bucket access from inside the docker network
  # is over the service hostname `seaweedfs`.
  seaweedfs:
    # Pinned for the re-soak. 4.25 (prior `latest`) exhibited the volume-server
    # SIGSEGV / read-only behaviour under PUT burst documented in
    # SEAWEEDFS_PILOT.md §9.1; 4.29 is the current stable at re-soak start.
    image: chrislusf/seaweedfs:4.29
    profiles: ["seaweedfs-pilot"]
    command: >
      server
      -dir=/data
      -ip=seaweedfs
      -filer
      -s3
      -s3.config=/etc/seaweedfs/s3.json
      -master.volumeSizeLimitMB=1024
    ports:
      - "127.0.0.1:8333:8333"  # S3 API
      - "127.0.0.1:8443:8888"  # Filer (browser) — only loopback
    volumes:
      - seaweedfs-data:/data
      - ./seaweedfs:/etc/seaweedfs:ro
    healthcheck:
      # TCP probe via BusyBox nc — the S3 API on 8333 responds with 403
      # AccessDenied for unauthenticated requests, which would defeat any
      # HTTP-based test that treats non-2xx as failure. A successful TCP
      # handshake is sufficient proof of life and matches what the api-gw
      # client cares about.
      test: ["CMD-SHELL", "nc -z 127.0.0.1 8333"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 20s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          # Bumped from 1 CPU / 1 GiB for the re-soak: the single-process
          # server (master+volume+filer+s3) was resource-starved during the
          # initial-sync burst. See SEAWEEDFS_CUTOVER.md Phase 2 hardening.
          cpus: '2.0'
          memory: 3G

  # Bucket bootstrap + versioning + scoped lifecycle on parity_test/. Single
  # one-shot run: exits 0 when both backends agree the bucket exists and is
  # versioned. Re-run safely.
  seaweedfs-setup:
    image: quay.io/minio/mc:latest
    profiles: ["seaweedfs-pilot"]
    depends_on:
      seaweedfs:
        condition: service_healthy
    environment:
      - S3_SHADOW_ACCESS_KEY=${S3_SHADOW_ACCESS_KEY:-seaweedfs-pilot}
      - S3_SHADOW_SECRET_KEY=${S3_SHADOW_SECRET_KEY:-change-me-to-a-secure-password}
      - S3_SHADOW_BUCKET=${S3_SHADOW_BUCKET:-ifcpipeline}
    entrypoint: >
      /bin/sh -c "
      set -e;
      until mc alias set seaweed http://seaweedfs:8333 $${S3_SHADOW_ACCESS_KEY} $${S3_SHADOW_SECRET_KEY} >/dev/null 2>&1; do
        echo 'waiting for seaweedfs s3...'; sleep 1;
      done;
      mc mb --ignore-existing seaweed/$${S3_SHADOW_BUCKET};
      mc version enable seaweed/$${S3_SHADOW_BUCKET} || true;
      mc ilm rule add --noncurrent-expire-days 1 --prefix 'parity_test/' seaweed/$${S3_SHADOW_BUCKET} || true;
      echo 'seaweedfs bucket ready (versioned, parity_test/ noncurrent-expire=1d): '$${S3_SHADOW_BUCKET};
      "
    restart: "no"

  # One-shot: mirror everything currently in the MinIO bucket into SeaweedFS.
  # Writes a JSON summary to parity-reports/initial-sync.json. Re-run safely
  # — mc mirror is incremental.
  seaweedfs-initial-sync:
    image: quay.io/minio/mc:latest
    profiles: ["seaweedfs-pilot"]
    depends_on:
      seaweedfs-setup:
        condition: service_completed_successfully
      minio-setup:
        condition: service_started
    environment:
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_BUCKET=${S3_BUCKET:-ifcpipeline}
      - S3_SHADOW_ACCESS_KEY=${S3_SHADOW_ACCESS_KEY:-seaweedfs-pilot}
      - S3_SHADOW_SECRET_KEY=${S3_SHADOW_SECRET_KEY:-change-me-to-a-secure-password}
      - S3_SHADOW_BUCKET=${S3_SHADOW_BUCKET:-ifcpipeline}
    volumes:
      - ./parity-reports:/reports
      - ./scripts/seaweedfs-initial-sync.sh:/usr/local/bin/seaweedfs-initial-sync.sh:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/seaweedfs-initial-sync.sh"]
    restart: "no"

  # Long-running parity loop. Diffs MinIO ↔ SeaweedFS every 600 s; samples
  # N=20 shared keys for sha256/size diffs; cross-checks postgres
  # object_versions.metadata.shadow_version_id. Writes parity-reports/.
  parity-monitor:
    build:
      context: ./parity-monitor
      dockerfile: Dockerfile
      # The default docker bridge can't resolve pypi on this host (no DNS
      # configured on bridge0); fall back to host networking just for the
      # build. Runtime networking stays on the default compose network so
      # `seaweedfs:8333` and `postgres:5432` resolve normally.
      network: host
    profiles: ["seaweedfs-pilot"]
    depends_on:
      seaweedfs-initial-sync:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://minio:9000}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_BUCKET=${S3_BUCKET:-ifcpipeline}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_SHADOW_ENDPOINT_URL=${S3_SHADOW_ENDPOINT_URL:-http://seaweedfs:8333}
      - S3_SHADOW_ACCESS_KEY=${S3_SHADOW_ACCESS_KEY:-seaweedfs-pilot}
      - S3_SHADOW_SECRET_KEY=${S3_SHADOW_SECRET_KEY:-change-me-to-a-secure-password}
      - S3_SHADOW_BUCKET=${S3_SHADOW_BUCKET:-ifcpipeline}
      - S3_SHADOW_REGION=${S3_SHADOW_REGION:-us-east-1}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-ifcpipeline}
      - POSTGRES_USER=${POSTGRES_USER:-ifcpipeline}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PARITY_INTERVAL_S=${PARITY_INTERVAL_S:-600}
      - PARITY_SAMPLE_N=${PARITY_SAMPLE_N:-20}
    volumes:
      - ./parity-reports:/reports
      - ./scripts:/scripts:ro
    command: ["python", "/app/parity_check.py"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M

  # Daily SeaweedFS-only smoke (PUT/overwrite/list-versions/lifecycle on
  # parity_test/ prefix). Same image as parity-monitor.
  daily-smoke:
    build:
      context: ./parity-monitor
      dockerfile: Dockerfile
      network: host
    profiles: ["seaweedfs-pilot"]
    depends_on:
      seaweedfs-setup:
        condition: service_completed_successfully
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - S3_SHADOW_ENDPOINT_URL=${S3_SHADOW_ENDPOINT_URL:-http://seaweedfs:8333}
      - S3_SHADOW_ACCESS_KEY=${S3_SHADOW_ACCESS_KEY:-seaweedfs-pilot}
      - S3_SHADOW_SECRET_KEY=${S3_SHADOW_SECRET_KEY:-change-me-to-a-secure-password}
      - S3_SHADOW_BUCKET=${S3_SHADOW_BUCKET:-ifcpipeline}
      - S3_SHADOW_REGION=${S3_SHADOW_REGION:-us-east-1}
      - SMOKE_INTERVAL_S=${SMOKE_INTERVAL_S:-86400}
      # Cross-day deferred lifecycle check: a canary non-current version must
      # be reaped within this grace window (default 2 days) by the 1-day
      # NoncurrentVersionExpiration rule. Replaces the old 30-min blocking
      # wait that could never satisfy a 1-day rule.
      - SMOKE_LIFECYCLE_GRACE_S=${SMOKE_LIFECYCLE_GRACE_S:-172800}
    volumes:
      - ./parity-reports:/reports
    command: ["python", "/app/daily_smoke.py"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 192M

  # ------------------------------------------------------------------------
  # Shadow env passthrough on production services. The values default to
  # empty so the dual-write code in shared/object_storage.py stays inert
  # unless .env populates them. Order matters: list-style envs in this
  # override file are *appended* to the list-style envs in the main file.
  # ------------------------------------------------------------------------

  api-gateway:
    # Default docker bridge has no usable DNS on this host (pypi unreachable
    # during pip install). Force pip to run over the host network during
    # the image build; runtime networking is unaffected. Same issue
    # documented in SEAWEEDFS_PILOT.md §9.1 for the parity-monitor build.
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
      network: host
    environment: *shadow-env
    volumes:
      - ./parity-reports:/reports

  # All workers need build.network: host for the same DNS reason documented
  # on api-gateway above. Without it, pip install in their Dockerfiles
  # cannot reach pypi during `docker compose build`.

  ifccsv-worker:
    build:
      context: .
      dockerfile: ifccsv-worker/Dockerfile
      network: host
    environment: *shadow-env
    volumes:
      - ./parity-reports:/reports

  ifctester-worker:
    build:
      context: .
      dockerfile: ifctester-worker/Dockerfile
      network: host
    environment: *shadow-env
    volumes:
      - ./parity-reports:/reports

  ifcconvert-worker:
    build:
      context: .
      dockerfile: ifcconvert-worker/Dockerfile
      network: host
    environment: *shadow-env
    volumes:
      - ./parity-reports:/reports

  ifcclash-worker:
    build:
      context: .
      dockerfile: ifcclash-worker/Dockerfile
      network: host
    environment: *shadow-env
    volumes:
      - ./parity-reports:/reports

  ifcdiff-worker:
    build:
      context: .
      dockerfile: ifcdiff-worker/Dockerfile
      network: host
    environment: *shadow-env
    volumes:
      - ./parity-reports:/reports

  ifc5d-worker:
    build:
      context: .
      dockerfile: ifc5d-worker/Dockerfile
      network: host
    environment: *shadow-env
    volumes:
      - ./parity-reports:/reports

  ifc2json-worker:
    build:
      context: .
      dockerfile: ifc2json-worker/Dockerfile
      network: host
    environment: *shadow-env
    volumes:
      - ./parity-reports:/reports

  ifcpatch-worker:
    build:
      context: .
      dockerfile: ifcpatch-worker/Dockerfile
      network: host
    environment: *shadow-env
    volumes:
      - ./parity-reports:/reports

  guid-index-worker:
    build:
      context: .
      dockerfile: guid-index-worker/Dockerfile
      network: host
    environment: *shadow-env
    volumes:
      - ./parity-reports:/reports

volumes:
  seaweedfs-data:
