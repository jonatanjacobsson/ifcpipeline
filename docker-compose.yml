services:
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    platform: linux/amd64
    user: "1000:1000"
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "8100:80"
    depends_on:
      - ifccsv-worker
      - ifctester-worker
      - ifcdiff-worker
      - ifcpatch-worker
      - redis
      - postgres
      - ifc-viewer
      - minio-setup
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=DEBUG
      - IFC_PIPELINE_API_KEY=${IFC_PIPELINE_API_KEY}
      - IFC_PIPELINE_ALLOWED_IP_RANGES=${IFC_PIPELINE_ALLOWED_IP_RANGES}
      - DOCKER_GATEWAY_IP=${DOCKER_GATEWAY_IP:-172.18.0.1}
      - IFC_PIPELINE_EXTERNAL_URL=${IFC_PIPELINE_EXTERNAL_URL}
      - IFC_PIPELINE_PREVIEW_EXTERNAL_URL=${IFC_PIPELINE_PREVIEW_EXTERNAL_URL}
      - REDIS_URL=redis://redis:6379/0
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-ifcpipeline}
      - POSTGRES_USER=${POSTGRES_USER:-ifcpipeline}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - USE_OBJECT_STORAGE=${USE_OBJECT_STORAGE:-true}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://minio:9000}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_BUCKET=${S3_BUCKET:-ifcpipeline}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_PUBLIC_ENDPOINT_URL=${S3_PUBLIC_ENDPOINT_URL:-http://localhost:9000}
    volumes:
      - ./shared/uploads:/uploads
      - ./shared/output:/output
      - ./shared/examples:/examples
      - ./ifcpatch-worker/custom_recipes:/app/custom_recipes
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M

  ifc-viewer:
    build:
      context: ./ifc-viewer
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE=${IFC_PIPELINE_EXTERNAL_URL}
    ports:
      - "8101:3000"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M

  redis:
    image: "redis:7.2.11-alpine"
    tmpfs:
      - /data
    command: >
      sh -c "
      sysctl vm.overcommit_memory=1 || true &&
      redis-server
      --save \"\"
      --appendonly no
      --stop-writes-on-bgsave-error no
      --loglevel notice
      --maxmemory 200mb
      --maxmemory-policy allkeys-lru
      "
    cap_add:
      - SYS_ADMIN
    stop_signal: SIGTERM
    stop_grace_period: 3s
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M

  # --- Object storage (S3-compatible) -------------------------------------
  minio:
    image: quay.io/minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      # Host-local only. Use an SSH tunnel or authenticated reverse proxy
      # for remote access; never expose MinIO directly to the internet.
      - "127.0.0.1:9000:9000"   # S3 API
      - "127.0.0.1:9001:9001"   # Web console
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY:?S3_ACCESS_KEY must be set in .env}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_KEY:?S3_SECRET_KEY must be set in .env}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # One-shot: wait for MinIO, create the bucket if missing.
  minio-setup:
    image: quay.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      set -e;
      until mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-minioadmin} >/dev/null 2>&1; do
        echo 'waiting for minio...'; sleep 1;
      done;
      mc mb --ignore-existing local/${S3_BUCKET:-ifcpipeline};
      echo 'bucket ready: ${S3_BUCKET:-ifcpipeline}';
      "
    restart: "no"

  rq-dashboard:
    image: hannes221/rq-dashboard-fast:latest
    ports:
      - "9281:8000"
    environment:
      - REDIS_URL=redis://redis:6379/
      - FASTAPI_PORT=8000
    command: ["python3", "app.py"]
    volumes:
      - ./rq-dashboard-custom/css/main.css:/app/rq_dashboard_fast/static/css/main.css:ro
      - ./rq-dashboard-custom/templates/job.html:/app/rq_dashboard_fast/templates/job.html:ro
      - ./rq-dashboard-custom/rq_dashboard_fast.py:/app/rq_dashboard_fast/rq_dashboard_fast.py:ro
      - ./rq-dashboard-custom/utils/jobs.py:/app/rq_dashboard_fast/utils/jobs.py:ro
      - ./shared/uploads:/uploads:ro
    depends_on:
      - redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256M

  dozzle:
    image: amir20/dozzle:latest
    ports:
      - "9282:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - DOZZLE_LEVEL=info
      - DOZZLE_TAILSIZE=300
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 128M

  ifc5d-worker:
    build:
      context: .
      dockerfile: ifc5d-worker/Dockerfile
    platform: linux/amd64
    user: "1000:1000"
    volumes:
      - ./shared/uploads:/uploads
      - ./shared/output:/output
      - ./shared/examples:/examples
