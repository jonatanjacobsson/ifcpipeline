# Primary-host overlay: publish Redis, Postgres, and SeaweedFS S3 on all host
# interfaces so DHCP / reboot IP changes do not break container startup.
#
# Usage (from repo root):
#   docker compose -f docker-compose.control-plane.yml -f docker-compose.host-lan.yml up -d redis postgres seaweedfs
#
# Restrict off-host access to the worker VM with:
#   sudo ./scripts/apply-host-lan-firewall.sh
#
# PIPELINE_LAN_IP in .env is auto-synced by scripts for worker .env.remote only;
# it is not used for Docker port bindings.

services:
  redis:
    ports:
      - "6379:6379"

  seaweedfs:
    ports:
      - "8333:8333"
      - "127.0.0.1:8443:8888"

  postgres:
    ports:
      - "5432:5432"
